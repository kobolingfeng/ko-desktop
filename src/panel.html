<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>ko desktop</title>
<style>
/* ======================================================
 *  Modern light — Linear/Vercel/Stripe inspired
 *  Neutral Zinc base + Violet-600 accent
 * ====================================================== */
:root{
    /* base (zinc, light) */
    --bg:         #ffffff;
    --surface:    #fafafa;
    --surface-2:  #f4f4f5;
    --surface-h:  #f4f4f5;
    --border:     #e4e4e7;
    --border-h:   #d4d4d8;
    /* accent (violet 600/700 — more contrast on white) */
    --accent:     #7c3aed;
    --accent-h:   #6d28d9;
    --accent-dim: rgba(124,58,237,.08);
    --accent-ring:rgba(124,58,237,.22);
    /* text */
    --txt:        #09090b;
    --txt2:       #52525b;
    --txt3:       #a1a1aa;
    /* semantic (600 tints — readable on white) */
    --green:      #059669;
    --amber:      #d97706;
    --red:        #dc2626;
    --red-bg:     rgba(220,38,38,.08);
    --track:      #e4e4e7;
    /* radii */
    --r-sm:6px; --r:8px; --r-lg:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Inter','SF Pro Display','Segoe UI Variable','Segoe UI',-apple-system,sans-serif;
    background:var(--bg);color:var(--txt);
    font-size:13px;line-height:1.5;
    height:100vh;overflow:hidden;user-select:none;
    display:flex;flex-direction:column;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
}
button{font:inherit;color:inherit}

/* ── Titlebar ── */
.bar{
    display:flex;align-items:center;gap:10px;
    padding:10px 14px;flex-shrink:0;
    border-bottom:1px solid var(--border);
    background:var(--bg);
}
.bar-sym{
    width:16px;height:16px;flex-shrink:0;border-radius:5px;
    background:linear-gradient(135deg,var(--accent),#5b21b6);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.2);
}
.bar h1{
    flex:1;font-size:13px;font-weight:600;color:var(--txt);letter-spacing:-.01em;
}
.bar-btn{
    cursor:pointer;width:28px;height:28px;border:none;border-radius:var(--r-sm);
    background:transparent;color:var(--txt2);
    display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s;
}
.bar-btn:hover{background:var(--surface-h);color:var(--txt)}
.bar-btn.x:hover{background:var(--red);color:#fff}
.bar-btn svg{width:13px;height:13px}

/* ── Main layout ── */
.main{flex:1;display:flex;overflow:hidden}
.col-l{
    width:320px;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;
    padding:20px;background:var(--bg);
    border-right:1px solid var(--border);
}
.resizer{width:1px;flex-shrink:0;cursor:col-resize;background:var(--border);transition:background .15s;position:relative}
.resizer:hover,.resizer.active{background:var(--accent)}
.resizer::after{content:'';position:absolute;inset:-4px -5px;z-index:1}
.col-r{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:20px 22px}
.col-l::-webkit-scrollbar,.lib::-webkit-scrollbar{width:8px}
.col-l::-webkit-scrollbar-track,.lib::-webkit-scrollbar-track{background:transparent}
.col-l::-webkit-scrollbar-thumb,.lib::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;border:2px solid var(--bg)}
.col-l::-webkit-scrollbar-thumb:hover,.lib::-webkit-scrollbar-thumb:hover{background:var(--border-h)}

/* ── Section ── */
.sec{margin-bottom:22px}
.sec-t{
    font-size:11px;font-weight:500;color:var(--txt3);
    margin-bottom:10px;letter-spacing:.01em;
}

/* ── Now playing card ── */
.np{
    display:flex;gap:12px;align-items:center;
    padding:10px;border:1px solid var(--border);border-radius:var(--r);
    background:var(--surface);transition:border-color .14s;
}
.np:hover{border-color:var(--border-h)}
.np-thumb{
    width:76px;height:44px;border-radius:var(--r-sm);overflow:hidden;flex-shrink:0;
    background:var(--surface-2);display:flex;align-items:center;justify-content:center;
}
.np-thumb img{width:100%;height:100%;object-fit:cover}
.np-thumb svg{width:18px;height:18px;color:var(--txt3)}
.np-body{flex:1;min-width:0}
.np-name{font-size:13px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.005em}
.np-stat{font-size:12px;color:var(--txt2);margin-top:3px;display:flex;align-items:center;gap:7px}
.ind{width:6px;height:6px;border-radius:50%;flex-shrink:0;position:relative}
.ind.on{background:var(--green)}
.ind.on::after{
    content:'';position:absolute;inset:-1px;border-radius:50%;
    background:var(--green);opacity:.35;
    animation:pulse-ring 1.8s ease-out infinite;
}
.ind.off{background:var(--amber)}
.ind.none{background:var(--txt3)}
@keyframes pulse-ring{0%{opacity:.5;transform:scale(1)}100%{opacity:0;transform:scale(3)}}

/* ── Transport ── */
.tr{display:flex;align-items:center;justify-content:center;gap:10px;padding:2px 0}
.tb{
    width:36px;height:36px;border:1px solid var(--border);border-radius:var(--r-sm);
    background:transparent;color:var(--txt2);cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .12s;
}
.tb:hover{border-color:var(--border-h);color:var(--txt);background:var(--surface)}
.tb:active{transform:scale(.96)}
.tb svg{width:14px;height:14px}
.tb.pri{
    width:44px;height:44px;border:none;color:#fff;
    background:var(--accent);
    box-shadow:0 1px 0 rgba(255,255,255,.2) inset, 0 4px 14px -4px rgba(124,58,237,.4);
}
.tb.pri:hover{background:var(--accent-h)}
.tb.pri svg{width:16px;height:16px}

/* ── Row (slider) ── */
.srow{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.srow .lbl{font-size:12px;font-weight:500;color:var(--txt2);width:36px;flex-shrink:0}
.srow .val{font-size:12px;font-weight:500;color:var(--txt);min-width:46px;text-align:right;font-variant-numeric:tabular-nums}
input[type=range]{
    flex:1;-webkit-appearance:none;appearance:none;
    height:4px;border-radius:2px;background:var(--track);outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;
    width:14px;height:14px;border-radius:50%;
    background:var(--txt);border:none;
    box-shadow:0 0 0 0 transparent;
    transition:box-shadow .15s,background .15s;
}
input[type=range]:hover::-webkit-slider-thumb{box-shadow:0 0 0 5px var(--accent-ring)}
input[type=range]:active::-webkit-slider-thumb{background:var(--accent-h);box-shadow:0 0 0 6px var(--accent-ring)}

/* ── Toggle (iOS-style) ── */
.trow{display:flex;align-items:center;gap:10px;margin-top:14px}
.tgl{
    width:32px;height:18px;border-radius:9px;padding:0;border:none;
    background:var(--border);cursor:pointer;position:relative;transition:background .18s;
}
.tgl.on{background:var(--accent)}
.tgl::after{
    content:'';position:absolute;top:2px;left:2px;
    width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);
    transition:transform .18s cubic-bezier(.2,.8,.2,1);
}
.tgl.on::after{transform:translateX(14px)}
.tgl-lbl{font-size:12px;font-weight:500;color:var(--txt2)}

/* ── Segmented control (Arc-style pill) ── */
.seg{
    display:flex;border:1px solid var(--border);border-radius:var(--r-sm);
    padding:2px;background:var(--surface);flex:1;gap:2px;
}
.seg-btn{
    flex:1;padding:5px 8px;border:none;border-radius:4px;background:transparent;
    color:var(--txt2);font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;
    display:flex;align-items:center;justify-content:center;gap:5px;
}
.seg-btn:hover:not(.on){color:var(--txt);background:var(--surface-h)}
.seg-btn.on{background:var(--surface-h);color:var(--txt);box-shadow:0 1px 2px rgba(0,0,0,.3)}
.seg-btn svg{width:12px;height:12px}

/* ── Exit button ── */
.exit-btn{
    margin-top:auto;padding:0;
    height:36px;border:1px solid var(--border);border-radius:var(--r-sm);
    background:transparent;color:var(--red);cursor:pointer;font-family:inherit;
    font-size:12px;font-weight:500;
    display:flex;align-items:center;justify-content:center;gap:8px;transition:all .12s;
}
.exit-btn:hover{background:var(--red-bg);border-color:var(--red)}
.exit-btn svg{width:13px;height:13px}

/* ── Right column header ── */
.rh{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-shrink:0}
.rh .sec-t{margin-bottom:0;flex:1;font-size:15px;font-weight:600;color:var(--txt);letter-spacing:-.01em}
.rh-btn{
    width:32px;height:32px;border:1px solid var(--border);border-radius:var(--r-sm);
    background:transparent;color:var(--txt2);cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .12s;
}
.rh-btn:hover{border-color:var(--border-h);color:var(--txt);background:var(--surface)}
.rh-btn svg{width:13px;height:13px}

/* ── Library grid ── */
.lib{flex:1;overflow-y:auto;padding-right:4px}
.lgrid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,220px);justify-content:start}
.empty{text-align:center;padding:80px 0;color:var(--txt3);font-size:13px}
.empty svg{width:40px;height:40px;opacity:.3;display:block;margin:0 auto 14px}

/* ── Video card ── */
.vc{
    border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;
    background:var(--surface);transition:all .14s;position:relative;
}
.vc:hover{border-color:var(--border-h);transform:translateY(-1px);box-shadow:0 6px 16px -6px rgba(0,0,0,.08)}
.vc.act{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.vc.act::before{
    content:'';position:absolute;top:10px;left:10px;z-index:2;
    width:6px;height:6px;border-radius:50%;background:var(--green);
    box-shadow:0 0 0 4px rgba(5,150,105,.18);
}
.vt{
    width:100%;aspect-ratio:16/9;background:var(--surface-2);overflow:hidden;
    display:flex;align-items:center;justify-content:center;position:relative;
}
.vt img{width:100%;height:100%;object-fit:cover}
.vt>svg{width:28px;height:28px;color:var(--txt3);opacity:.4}
.vt .ov{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,.65));
    opacity:0;transition:opacity .14s;
}
.vc:hover .ov{opacity:1}
.ov svg{width:34px;height:34px;color:#fff}
.vi{padding:10px 12px}
.vi-n{font-size:12px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.005em}
.vi-s{font-size:11px;color:var(--txt3);margin-top:3px;font-variant-numeric:tabular-nums}
.vr{
    position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:6px;
    border:none;cursor:pointer;
    background:rgba(0,0,0,.55);color:#fff;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    display:none;align-items:center;justify-content:center;z-index:3;transition:background .12s;
}
.vc:hover .vr{display:flex}
.vr:hover{background:var(--red)}
.vr svg{width:11px;height:11px}

/* ── Footer ── */
.foot{
    padding:8px 14px;border-top:1px solid var(--border);
    background:var(--bg);
    display:flex;justify-content:space-between;align-items:center;
    font-size:11px;font-weight:500;
    color:var(--txt3);flex-shrink:0;
}
.foot .dot{
    display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);
    margin-right:6px;vertical-align:middle;
    box-shadow:0 0 0 3px rgba(5,150,105,.12);
}

/* ── Resize cursor (forced via body class, !important beats per-element cursors) ── */
body.rz-ew,body.rz-ew *{cursor:ew-resize !important}
body.rz-ns,body.rz-ns *{cursor:ns-resize !important}
body.rz-nwse,body.rz-nwse *{cursor:nwse-resize !important}
body.rz-nesw,body.rz-nesw *{cursor:nesw-resize !important}

/* ── Gamepad ── */
.gp-focused{
    outline:2px solid var(--accent) !important;
    outline-offset:2px;
    z-index:2;position:relative;
}
.gp-focused.vc{transform:translateY(-1px)}
.toast{
    position:fixed;top:52px;left:50%;transform:translateX(-50%);
    padding:10px 18px;border:1px solid var(--border);border-radius:var(--r);
    background:rgba(255,255,255,.92);color:var(--txt);
    font-size:12px;font-weight:500;
    box-shadow:0 10px 30px -10px rgba(0,0,0,.12);
    opacity:0;transition:opacity .2s,transform .2s;
    pointer-events:none;z-index:999;
    display:flex;align-items:center;gap:10px;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(4px)}
.toast .gp-ico{
    width:8px;height:8px;border-radius:50%;
    background:var(--accent);flex-shrink:0;
}
.gp-badge{
    display:none;align-items:center;gap:6px;
    padding:3px 8px;border:1px solid var(--border);border-radius:4px;
    background:var(--surface-2);color:var(--txt2);
    font-size:10px;font-weight:500;
}
.gp-badge.on{display:inline-flex}
.gp-badge::before{
    content:'';width:6px;height:6px;border-radius:50%;
    background:var(--accent);
}
</style>
</head>
<body>

<!-- TITLEBAR (JS drag) -->
<div class="bar" id="titlebar">
    <div class="bar-sym"></div>
    <h1>ko desktop</h1>
    <button class="bar-btn" id="btnMin" title="最小化">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="bar-btn x" id="btnClose" title="关闭">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
</div>

<!-- TWO-COLUMN LAYOUT -->
<div class="main">

<!-- LEFT: CONTROLS -->
<div class="col-l" id="colL">

    <div class="sec">
        <div class="sec-t">正在播放</div>
        <div class="np">
            <div class="np-thumb" id="npThumb">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
            </div>
            <div class="np-body">
                <div class="np-name" id="videoName">未选择视频</div>
                <div class="np-stat"><span class="ind none" id="statusDot"></span><span id="videoStatus">就绪</span></div>
            </div>
        </div>
    </div>

    <div class="sec">
        <div class="sec-t">播放控制</div>
        <div class="tr">
            <button class="tb" id="btnRestart" title="重新开始">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
            </button>
            <button class="tb pri" id="btnPlayPause" title="播放/暂停">
                <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="7,3 20,12 7,21"/></svg>
            </button>
            <button class="tb" id="btnStop" title="停止">
                <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
            </button>
        </div>
    </div>

    <div class="sec">
        <div class="sec-t">参数</div>
        <div class="srow">
            <span class="lbl">速度</span>
            <input type="range" id="speedSlider" min="25" max="400" value="100" step="25">
            <span class="val" id="speedValue">1.00x</span>
        </div>
        <div class="srow">
            <span class="lbl">音量</span>
            <input type="range" id="volumeSlider" min="0" max="100" value="100">
            <span class="val" id="volumeValue">100%</span>
        </div>
        <div class="trow">
            <button class="tgl" id="muteToggle"></button>
            <span class="tgl-lbl" id="muteLabel">静音</span>
        </div>
        <div class="srow" style="margin-top:10px">
            <span class="lbl">模式</span>
            <div class="seg">
                <button class="seg-btn" id="modeLoopOne" title="循环当前视频">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/><text x="12" y="15" text-anchor="middle" font-size="8" font-weight="700" fill="currentColor" stroke="none">1</text></svg>
                    循环
                </button>
                <button class="seg-btn" id="modeLoopList" title="列表顺序播放">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                    列表
                </button>
            </div>
        </div>
    </div>

    <button class="exit-btn" id="btnExit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        退出应用
    </button>
</div>

<!-- RESIZER -->
<div class="resizer" id="colResizer"></div>

<!-- RIGHT: VIDEO LIBRARY -->
<div class="col-r">
    <div class="rh">
        <div class="sec-t">视频库</div>
        <button class="rh-btn" id="btnAddFiles" title="导入文件">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        </button>
        <button class="rh-btn" id="btnAddFolder" title="导入文件夹">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        </button>
    </div>
    <div class="lib">
        <div id="libGrid" class="lgrid"></div>
        <div id="libEmpty" class="empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
            数据库为空<br>请导入视频文件
        </div>
    </div>
</div>

</div>

<!-- FOOTER -->
<div class="foot">
    <span>ko-desktop</span>
    <span style="display:flex;align-items:center;gap:10px">
        <span class="gp-badge" id="gpBadge">手柄</span>
        <span><span class="dot"></span>运行中</span>
    </span>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><span class="gp-ico"></span><span id="toastTxt"></span></div>

<script>
const pending = new Map();
let nextId = 0;
const hasWV = typeof window !== 'undefined' && 'chrome' in window && 'webview' in window.chrome;

// ── Window drag via JS ──
(function(){
    const bar = document.getElementById('titlebar');
    let dragging = false, dx = 0, dy = 0;
    bar.addEventListener('mousedown', e => {
        if (e.target.closest('button')) return;
        dragging = true; dx = e.screenX; dy = e.screenY;
        e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const mx = e.screenX - dx, my = e.screenY - dy;
        dx = e.screenX; dy = e.screenY;
        if (hasWV) window.chrome.webview.postMessage({ id: -999, cmd: 'panel.moveBy', args: { x: mx, y: my } });
    });
    document.addEventListener('mouseup', () => { dragging = false; });
})();

// ── Window edge resize (Tauri/Wails style) ──
(function(){
    const EDGE = 6; // px hit zone on each edge
    const classMap = {
        'left': 'rz-ew', 'right': 'rz-ew',
        'top': 'rz-ns', 'bottom': 'rz-ns',
        'top-left': 'rz-nwse', 'bottom-right': 'rz-nwse',
        'top-right': 'rz-nesw', 'bottom-left': 'rz-nesw'
    };
    let curEdge = null;

    function detectEdge(e) {
        const w = window.innerWidth, h = window.innerHeight;
        const x = e.clientX, y = e.clientY;
        const L = x < EDGE, R = x >= w - EDGE;
        const T = y < EDGE, B = y >= h - EDGE;
        if (T && L) return 'top-left';
        if (T && R) return 'top-right';
        if (B && L) return 'bottom-left';
        if (B && R) return 'bottom-right';
        if (L) return 'left';
        if (R) return 'right';
        if (T) return 'top';
        if (B) return 'bottom';
        return null;
    }

    function setEdge(edge) {
        if (edge === curEdge) return;
        if (curEdge) document.body.classList.remove(classMap[curEdge]);
        curEdge = edge;
        if (edge) document.body.classList.add(classMap[edge]);
    }

    document.addEventListener('mousemove', e => setEdge(detectEdge(e)));

    document.addEventListener('mousedown', e => {
        if (e.button !== 0) return;
        const edge = detectEdge(e);
        if (edge) {
            e.preventDefault();
            e.stopImmediatePropagation();
            invoke('panel.startResize', { edge });
        }
    }, true); // capture phase so we beat titlebar drag & other handlers
})();

// ── Column resizer ──
(function(){
    const resizer = document.getElementById('colResizer');
    const col = document.getElementById('colL');
    const MIN_L = 220, MIN_R = 250;
    let dragging = false, startX, startW;
    resizer.addEventListener('mousedown', e => {
        dragging = true; startX = e.clientX; startW = col.offsetWidth;
        resizer.classList.add('active');
        document.body.style.cursor = 'col-resize';
        e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
        if (!dragging) return;
        let nw = startW + (e.clientX - startX);
        const maxW = document.body.clientWidth - MIN_R - 5;
        nw = Math.max(MIN_L, Math.min(maxW, nw));
        col.style.width = nw + 'px';
    });
    document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        resizer.classList.remove('active');
        document.body.style.cursor = '';
    });
})();

function invoke(cmd, args = {}) {
    return new Promise((resolve, reject) => {
        if (!hasWV) { reject(new Error('No WebView2')); return; }
        const id = nextId++;
        pending.set(id, { resolve, reject });
        window.chrome.webview.postMessage({ id, cmd, args });
    });
}

if (hasWV) {
    window.chrome.webview.addEventListener('message', e => {
        const msg = e.data;
        if (msg && typeof msg.id === 'number') {
            const p = pending.get(msg.id);
            if (p) { pending.delete(msg.id); 'error' in msg ? p.reject(new Error(msg.error)) : p.resolve(msg.result); }
        }
        if (msg && typeof msg.event === 'string') {
            window.dispatchEvent(new CustomEvent('ipc:' + msg.event, { detail: msg.data }));
        }
    });
}

let state = { speed: 1, volume: 1, muted: false, paused: false, videoPath: '', playbackMode: 'loop-one' };

const I_PLAY  = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="7,3 20,12 7,21"/></svg>';
const I_PAUSE = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/></svg>';
const I_FILM  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>';
const I_PLAY_O = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="8,5 19,12 8,19"/></svg>';
const I_X = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

async function refreshState() {
    try { state = await invoke('wallpaper.getState'); updateUI(); } catch {}
}

function updateUI() {
    const name = state.videoPath ? state.videoPath.split(/[\\/]/).pop() : '';
    document.getElementById('videoName').textContent = name || '未选择视频';
    document.getElementById('videoStatus').textContent = !name ? '就绪' : state.paused ? '已暂停' : '播放中';

    const dot = document.getElementById('statusDot');
    dot.className = 'ind ' + (!name ? 'none' : state.paused ? 'off' : 'on');

    document.getElementById('btnPlayPause').innerHTML = state.paused ? I_PLAY : I_PAUSE;

    document.getElementById('speedSlider').value = Math.round(state.speed * 100);
    document.getElementById('speedValue').textContent = state.speed.toFixed(2) + 'x';
    document.getElementById('volumeSlider').value = Math.round(state.volume * 100);
    document.getElementById('volumeValue').textContent = Math.round(state.volume * 100) + '%';

    const mt = document.getElementById('muteToggle');
    mt.classList.toggle('on', state.muted);
    document.getElementById('muteLabel').textContent = state.muted ? '已静音' : '静音';

    const mode = state.playbackMode === 'loop-list' ? 'loop-list' : 'loop-one';
    document.getElementById('modeLoopOne').classList.toggle('on', mode === 'loop-one');
    document.getElementById('modeLoopList').classList.toggle('on', mode === 'loop-list');

    updateNpThumb();
    if (library.length) renderLibrary();
}

function updateNpThumb() {
    const el = document.getElementById('npThumb');
    if (!state.videoPath) { el.innerHTML = I_FILM; return; }
    const entry = library.find(v => v.path === state.videoPath);
    if (entry && entry.thumb) {
        el.innerHTML = '<img src="' + entry.thumb + '">';
    } else {
        el.innerHTML = I_FILM;
    }
}

// ── Button handlers ──
// Minimize → taskbar icon stays
document.getElementById('btnMin').onclick = () => invoke('panel.minimize');
// Close → hide to tray only
document.getElementById('btnClose').onclick = () => invoke('panel.hide');
// Exit → quit entire app
document.getElementById('btnExit').onclick = () => invoke('app.exit');

document.getElementById('btnPlayPause').onclick = async () => {
    state.paused = !state.paused;
    await invoke(state.paused ? 'wallpaper.pause' : 'wallpaper.play'); updateUI();
};
document.getElementById('btnRestart').onclick = async () => {
    await invoke('wallpaper.restart'); state.paused = false; updateUI();
};
document.getElementById('btnStop').onclick = async () => {
    await invoke('wallpaper.pause'); await invoke('wallpaper.restart');
    state.paused = true; updateUI();
};
document.getElementById('speedSlider').oninput = async function() {
    state.speed = this.value / 100;
    document.getElementById('speedValue').textContent = state.speed.toFixed(2) + 'x';
    await invoke('wallpaper.setSpeed', { rate: state.speed });
};
document.getElementById('volumeSlider').oninput = async function() {
    state.volume = this.value / 100;
    document.getElementById('volumeValue').textContent = Math.round(state.volume * 100) + '%';
    await invoke('wallpaper.setVolume', { volume: state.volume });
};
document.getElementById('muteToggle').onclick = async () => {
    state.muted = !state.muted;
    await invoke('wallpaper.setMuted', { muted: state.muted }); updateUI();
};
document.getElementById('modeLoopOne').onclick = async () => {
    state.playbackMode = 'loop-one';
    await invoke('wallpaper.setPlaybackMode', { mode: 'loop-one' }); updateUI();
};
document.getElementById('modeLoopList').onclick = async () => {
    state.playbackMode = 'loop-list';
    await invoke('wallpaper.setPlaybackMode', { mode: 'loop-list' }); updateUI();
};

window.addEventListener('ipc:wallpaper.stateChanged', e => {
    Object.assign(state, e.detail); updateUI();
});

// ── Library (thumbnails via native Shell API) ─────────────────
let library = [];

function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
    return (b/1073741824).toFixed(2) + ' GB';
}

async function loadLibrary() {
    try { library = await invoke('library.load'); } catch { library = []; }
    renderLibrary();
    genThumbnails();
}

async function saveLibrary() {
    try { await invoke('library.save', { entries: library }); } catch {}
}

function renderLibrary() {
    const grid = document.getElementById('libGrid');
    const empty = document.getElementById('libEmpty');
    empty.style.display = library.length ? 'none' : 'block';
    grid.innerHTML = '';
    library.forEach((v, i) => {
        const isAct = state.videoPath && state.videoPath === v.path;
        const c = document.createElement('div');
        c.className = 'vc' + (isAct ? ' act' : '');
        c.innerHTML = `<button class="vr">${I_X}</button>
            <div class="vt">${v.thumb ? '<img src="'+v.thumb+'">' : I_FILM}<div class="ov">${I_PLAY_O}</div></div>
            <div class="vi"><div class="vi-n" title="${v.name}">${v.name}</div><div class="vi-s">${fmtSize(v.size)}</div></div>`;
        c.addEventListener('click', e => {
            if (e.target.closest('.vr')) return;
            invoke('wallpaper.setVideo', { path: v.path });
        });
        c.querySelector('.vr').addEventListener('click', e => {
            e.stopPropagation();
            library.splice(i, 1); saveLibrary(); renderLibrary();
        });
        grid.appendChild(c);
    });
}

async function genThumbnails() {
    let changed = false;
    for (let i = 0; i < library.length; i++) {
        if (library[i].thumb) continue;
        try {
            const thumb = await invoke('library.thumbnail', { path: library[i].path });
            if (thumb) { library[i].thumb = thumb; changed = true; renderLibrary(); }
        } catch {}
    }
    if (changed) { saveLibrary(); updateNpThumb(); }
}

async function addEntries(entries) {
    const existing = new Set(library.map(v => v.path));
    const fresh = entries.filter(e => !existing.has(e.path));
    if (!fresh.length) return;
    library.push(...fresh);
    await saveLibrary();
    renderLibrary();
    genThumbnails();
}

document.getElementById('btnAddFiles').onclick = async () => {
    try { const f = await invoke('library.addFiles'); if (f && f.length) addEntries(f); } catch {}
};
document.getElementById('btnAddFolder').onclick = async () => {
    try { const f = await invoke('library.addFolder'); if (f && f.length) addEntries(f); } catch {}
};

// ══════════════════════════════════════════════════════
//  Gamepad input (Xbox / PS standard mapping)
//    Stick/D-pad → navigate
//    A → confirm · B → close panel
//    X → remove selected card · Y → play/pause wallpaper
//    LB/RB → volume ±10% · LT/RT → speed ±0.25x
//    Start → toggle mute · Back → import files
// ══════════════════════════════════════════════════════
(function(){
    const FOCUS_SEL = 'button:not([disabled]), input[type=range], .tgl, .vc';
    let gpIndex = -1;
    let focusEl = null;
    let prevBtns = {};
    let lastNavAt = 0;
    const NAV_REPEAT_MS = 180;
    const DEAD = 0.35;

    const toast = document.getElementById('toast');
    const toastTxt = document.getElementById('toastTxt');
    const badge = document.getElementById('gpBadge');
    let toastTimer = 0;
    function showToast(msg) {
        toastTxt.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function getFocusables() {
        return [...document.querySelectorAll(FOCUS_SEL)]
            .filter(el => {
                if (el.offsetParent === null) return false;
                const r = el.getBoundingClientRect();
                return r.width > 0 && r.height > 0;
            });
    }

    function setFocus(el) {
        if (focusEl === el) return;
        if (focusEl) focusEl.classList.remove('gp-focused');
        focusEl = el;
        if (el) {
            el.classList.add('gp-focused');
            // Ensure visible in scroll container
            el.scrollIntoView({ block: 'nearest', inline: 'nearest', behavior: 'smooth' });
        }
    }

    function clearFocus() {
        if (focusEl) focusEl.classList.remove('gp-focused');
        focusEl = null;
    }

    function centerOf(el) {
        const r = el.getBoundingClientRect();
        return { x: r.left + r.width/2, y: r.top + r.height/2, r };
    }

    // 2D geometric nearest-neighbor in a direction
    function findNeighbor(current, dir) {
        if (!current) {
            const list = getFocusables();
            return list[0] || null;
        }
        const src = centerOf(current);
        const candidates = getFocusables().filter(e => e !== current);
        let best = null, bestScore = Infinity;
        for (const el of candidates) {
            const c = centerOf(el);
            const dx = c.x - src.x, dy = c.y - src.y;
            let ok = false;
            if (dir === 'right' && dx > 6)  ok = true;
            if (dir === 'left'  && dx < -6) ok = true;
            if (dir === 'down'  && dy > 6)  ok = true;
            if (dir === 'up'    && dy < -6) ok = true;
            if (!ok) continue;
            const primary   = (dir === 'left' || dir === 'right') ? Math.abs(dx) : Math.abs(dy);
            const secondary = (dir === 'left' || dir === 'right') ? Math.abs(dy) : Math.abs(dx);
            const score = primary + secondary * 2.5;
            if (score < bestScore) { bestScore = score; best = el; }
        }
        return best || current;
    }

    function navigate(dir) {
        const next = findNeighbor(focusEl, dir) || getFocusables()[0];
        if (next) setFocus(next);
    }

    function activate() {
        if (!focusEl) return;
        if (focusEl.tagName === 'INPUT' && focusEl.type === 'range') return; // sliders via shoulder buttons
        focusEl.click();
    }

    function adjustSlider(id, delta) {
        const s = document.getElementById(id);
        if (!s) return;
        const step = parseInt(s.step) || 1;
        const min = parseInt(s.min), max = parseInt(s.max);
        let v = parseInt(s.value) + delta * step;
        v = Math.max(min, Math.min(max, v));
        s.value = v;
        s.dispatchEvent(new Event('input', { bubbles: true }));
    }

    // Track mouse clicks to sync focus (mouse user may start, switch to gamepad mid-use)
    document.addEventListener('click', e => {
        const el = e.target.closest(FOCUS_SEL);
        if (el && gpIndex !== -1) setFocus(el);
    }, true);

    function pollButton(gp, idx, onPress) {
        const pressed = !!(gp.buttons[idx] && gp.buttons[idx].pressed);
        const was = prevBtns[idx] || false;
        if (pressed && !was) onPress();
        prevBtns[idx] = pressed;
    }

    function pollGamepad() {
        if (gpIndex === -1) return;
        const pads = navigator.getGamepads ? navigator.getGamepads() : [];
        const gp = pads[gpIndex];
        if (!gp) { requestAnimationFrame(pollGamepad); return; }

        const now = performance.now();

        // Navigation: left stick + D-pad
        const lx = gp.axes[0] || 0, ly = gp.axes[1] || 0;
        let navDir = null;
        if (Math.abs(lx) > DEAD || Math.abs(ly) > DEAD) {
            if (Math.abs(lx) > Math.abs(ly)) navDir = lx > 0 ? 'right' : 'left';
            else navDir = ly > 0 ? 'down' : 'up';
        }
        // D-pad overrides stick (buttons 12-15: up/down/left/right)
        if (gp.buttons[12] && gp.buttons[12].pressed) navDir = 'up';
        else if (gp.buttons[13] && gp.buttons[13].pressed) navDir = 'down';
        else if (gp.buttons[14] && gp.buttons[14].pressed) navDir = 'left';
        else if (gp.buttons[15] && gp.buttons[15].pressed) navDir = 'right';

        if (navDir) {
            if (now - lastNavAt > NAV_REPEAT_MS) {
                navigate(navDir);
                lastNavAt = now;
            }
        } else {
            lastNavAt = 0;
        }

        // Face buttons (standard mapping: A=0 B=1 X=2 Y=3)
        pollButton(gp, 0, () => activate());                             // A
        pollButton(gp, 1, () => invoke('panel.hide'));                   // B → close
        pollButton(gp, 2, () => {                                        // X → remove card
            if (focusEl && focusEl.classList.contains('vc')) {
                const rm = focusEl.querySelector('.vr');
                if (rm) rm.click();
            }
        });
        pollButton(gp, 3, () => document.getElementById('btnPlayPause').click()); // Y

        // Shoulders: volume ± (4=LB, 5=RB)
        pollButton(gp, 4, () => adjustSlider('volumeSlider', -10));
        pollButton(gp, 5, () => adjustSlider('volumeSlider',  10));

        // Triggers: speed ± (6=LT, 7=RT)
        pollButton(gp, 6, () => adjustSlider('speedSlider', -1));
        pollButton(gp, 7, () => adjustSlider('speedSlider',  1));

        // 8=Back/Select → import files  9=Start → toggle mute
        pollButton(gp, 8, () => document.getElementById('btnAddFiles').click());
        pollButton(gp, 9, () => document.getElementById('muteToggle').click());

        requestAnimationFrame(pollGamepad);
    }

    window.addEventListener('gamepadconnected', e => {
        if (gpIndex !== -1) return;
        gpIndex = e.gamepad.index;
        badge.classList.add('on');
        showToast('手柄已连接: ' + (e.gamepad.id || '未知型号').split('(')[0].trim());
        // initial focus — first transport button
        const initial = document.getElementById('btnPlayPause') || getFocusables()[0];
        if (initial) setFocus(initial);
        requestAnimationFrame(pollGamepad);
    });

    window.addEventListener('gamepaddisconnected', e => {
        if (e.gamepad.index === gpIndex) {
            gpIndex = -1;
            prevBtns = {};
            badge.classList.remove('on');
            clearFocus();
            showToast('手柄已断开');
        }
    });

    // Clear focus ring on actual mouse movement so mouse users don't see stuck ring
    let lastMouse = 0;
    document.addEventListener('mousemove', () => {
        const now = performance.now();
        if (now - lastMouse > 100 && focusEl && gpIndex === -1) clearFocus();
        lastMouse = now;
    });
})();

refreshState();
loadLibrary();
setInterval(refreshState, 2000);
</script>
